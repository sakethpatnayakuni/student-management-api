<!DOCTYPE html>
<html>
    <head>
        <title>Student Management System</title>
        <style>
            body {
                font-family:Arial;
                background-color:#f4f6f9;
                padding:20px;
            }
            h1 {
                text-align:center;
            }
            table {
                width : 100%;
                border-collapse: collapse;
                background : white;
            }
            th,td {
                padding: 10px;
                border: 1px solid #ddd;
            }
            th {
                background-color: #4CAF50;
                color: white;
            }
            input {
                padding: 8px;
                background : #4CAF50;
                color : white;
                border : none;
            }
        </style>
    </head>
<body>

    <h1> Student Management System</h1>

    <form method="GET">
        <input type="text" name="search" placeholder="Search by name">
        <button type="submit">Search</button>
    </form>

    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Age</th>
            <th>Enroll Date</th>
            <th>Actions</th>
        </tr>

    <div style="margin-bottom: 15px;">
        <a href="{% url 'export_students_csv' %}">  
            <style="padding:10px; background-color:blue; color:white; text-decoration:none; border-radius:5px;">
            Download CSV
        </a>
    </div>

        {% for student in students %}
        <tr>
            <td>{{ student.id }}</td>
            <td>{{ student.name }}</td>
            <td>{{ student.age }}</td>
            <td>{{ student.enroll_date }}</td>

            <td>
                <a href="{% url 'edit_student' student.id %}" style="color: blue;">Edit</a> |
                <a href="{% url 'delete_student' student.id %}" style="color: red;">Delete</a>
            </td>
        </tr>
        {% endfor%}
    </table>
</body>
</html>
